version: "3.9"

services:
  # --- (Data Store) ---
  postgres:
    image: postgres:15-alpine
    container_name: etl_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-etl_user}
      POSTGRES_PASSWORD: ${DB_PASS:-etl_pass}
      POSTGRES_DB: ${DB_NAME:-etl_db}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- ETL (Application) ---
  etl-pipeline:
    build: .
    container_name: etl_pipeline_container
    restart: unless-stopped #Pipeline 
    depends_on:
      postgres:
        condition: service_healthy #  Healthcheck 
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-etl_db}
      - DB_USER=${DB_USER:-etl_user}
      - DB_PASS=${DB_PASS:-etl_pass}
    volumes:
      - ./output:/app/output
      - ./config:/app/config
    ports:
      - "8000:8000"

  # ---  (Monitoring Stack) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin 
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana

# ---  Volumes ---
volumes:
  pg_data:
  prometheus_data:
  grafana_data: